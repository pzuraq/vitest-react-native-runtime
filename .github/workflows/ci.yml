name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type checks ─────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & type checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/vitest-react-native-runtime
      - run: npm run lint
      - run: npm run check-types
      - run: npm run format:check

  # ── Unit + integration tests ───────────────────────────────────────────────
  unit-tests:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        working-directory: packages/vitest-react-native-runtime

  # ── E2E: Android ───────────────────────────────────────────────────────────
  e2e-android:
    name: E2E (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/vitest-react-native-runtime

      - name: Build test harness app
        working-directory: app
        run: |
          npm install
          npx expo prebuild --platform android --clean
          cd android && ./gradlew assembleDebug

      - name: Run E2E tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          script: |
            adb install app/android/app/build/outputs/apk/debug/app-debug.apk
            VITEST_E2E=1 VITEST_E2E_PLATFORM=android npx vitest run --config packages/vitest-react-native-runtime/vitest.config.e2e.ts

  # ── E2E: iOS ───────────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/vitest-react-native-runtime

      - name: Build test harness app
        working-directory: app
        run: |
          npm install
          npx expo prebuild --platform ios --clean
          cd ios && pod install && cd ..
          xcodebuild \
            -workspace ios/vitest-native.xcworkspace \
            -scheme vitest-native \
            -sdk iphonesimulator \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for runtime, devs in d['devices'].items():
            for dev in devs:
              if dev.get('isAvailable') and dev.get('udid'):
                print(dev['udid'])
                exit()
          ")
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install app on simulator
        run: |
          APP_PATH=$(find app/build -name "vitest-native.app" -type d | head -1)
          xcrun simctl install "$SIM_ID" "$APP_PATH"

      - name: Run E2E tests
        run: npx vitest run --config packages/vitest-react-native-runtime/vitest.config.e2e.ts
        env:
          VITEST_E2E: '1'
          VITEST_E2E_PLATFORM: ios
